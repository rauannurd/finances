<!DOCTYPE html>
<html lang="kk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Expense Tracker</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #F3F4F6; min-height: 100vh; }

    :root {
      --primary: #2563EB;
      --income: #16A34A;
      --expense: #DC2626;
      --card: #ffffff;
      --border: rgba(0,0,0,0.08);
      --text: #111827;
      --muted: #6B7280;
      --bg: #F3F4F6;
      --radius: 14px;
    }

    .app { max-width: 390px; margin: 0 auto; padding: 1rem; display: flex; flex-direction: column; gap: 12px; padding-bottom: 80px; }

    .screen { display: none; flex-direction: column; gap: 12px; }
    .screen.active { display: flex; }

    .topbar { display: flex; align-items: center; justify-content: space-between; padding: 4px 0; }
    .topbar-title { font-size: 17px; font-weight: 600; color: var(--text); }
    .topbar-btn { background: none; border: none; cursor: pointer; color: var(--primary); font-size: 14px; font-weight: 500; padding: 4px 0; display: flex; align-items: center; gap: 4px; }

    .balance-card {
      background: var(--primary);
      border-radius: var(--radius);
      padding: 1.25rem;
      color: #fff;
    }
    .balance-label { font-size: 13px; opacity: 0.75; margin-bottom: 4px; }
    .balance-amount { font-size: 32px; font-weight: 600; letter-spacing: -0.5px; }
    .balance-row { display: flex; gap: 12px; margin-top: 1rem; }
    .balance-stat { flex: 1; background: rgba(255,255,255,0.12); border-radius: 10px; padding: 10px 12px; }
    .balance-stat-label { font-size: 11px; opacity: 0.7; display: flex; align-items: center; gap: 4px; margin-bottom: 2px; }
    .balance-stat-value { font-size: 16px; font-weight: 600; }

    .section-title { font-size: 13px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }

    .tx-list { display: flex; flex-direction: column; gap: 1px; background: var(--border); border-radius: var(--radius); overflow: hidden; }
    .tx-item {
      background: var(--card);
      padding: 12px 14px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .tx-icon {
      width: 38px; height: 38px; border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; flex-shrink: 0;
    }
    .tx-info { flex: 1; min-width: 0; }
    .tx-title { font-size: 14px; font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .tx-date { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .tx-amount { font-size: 15px; font-weight: 600; }
    .tx-amount.income { color: var(--income); }
    .tx-amount.expense { color: var(--expense); }
    .tx-delete { background: none; border: none; cursor: pointer; color: var(--muted); font-size: 16px; padding: 4px; opacity: 0.4; transition: opacity 0.15s; }
    .tx-delete:hover { opacity: 1; color: var(--expense); }

    .empty { text-align: center; padding: 2rem 1rem; color: var(--muted); font-size: 14px; background: var(--card); }

    .fab {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      width: 54px; height: 54px; border-radius: 50%;
      background: var(--primary); color: #fff;
      border: none; cursor: pointer; font-size: 26px;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 16px rgba(37,99,235,0.4);
      transition: transform 0.15s, box-shadow 0.15s;
      z-index: 100;
    }
    .fab:hover { transform: translateX(-50%) scale(1.05); box-shadow: 0 6px 20px rgba(37,99,235,0.5); }
    .fab:active { transform: translateX(-50%) scale(0.95); }

    .form-card { background: var(--card); border-radius: var(--radius); border: 1px solid var(--border); overflow: hidden; }

    .type-switch { display: flex; background: #F9FAFB; border-bottom: 1px solid var(--border); }
    .type-btn { flex: 1; padding: 13px; border: none; background: none; cursor: pointer; font-size: 14px; font-weight: 500; color: var(--muted); transition: all 0.15s; border-bottom: 2px solid transparent; }
    .type-btn.active { color: var(--text); border-bottom: 2px solid var(--primary); background: var(--card); }

    .form-fields { padding: 16px; display: flex; flex-direction: column; gap: 14px; }
    .field-label { font-size: 12px; font-weight: 500; color: var(--muted); margin-bottom: 6px; }
    .field-input {
      width: 100%; padding: 11px 13px; border-radius: 10px;
      border: 1px solid var(--border); background: #F9FAFB;
      font-size: 15px; color: var(--text); font-family: inherit;
      transition: border-color 0.15s;
    }
    .field-input:focus { outline: none; border-color: var(--primary); background: #fff; }

    .category-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
    .cat-btn {
      padding: 8px 4px; border-radius: 10px; border: 1px solid var(--border);
      background: #F9FAFB; cursor: pointer;
      display: flex; flex-direction: column; align-items: center; gap: 4px;
      font-size: 10px; font-weight: 500; color: var(--muted); transition: all 0.12s;
    }
    .cat-btn span { font-size: 20px; }
    .cat-btn.selected { border-color: var(--primary); color: var(--primary); background: #EFF6FF; }

    .submit-btn {
      width: 100%; padding: 13px; border: none; border-radius: 10px;
      background: var(--primary); color: #fff; font-size: 15px;
      font-weight: 600; cursor: pointer; transition: opacity 0.15s;
      font-family: inherit;
    }
    .submit-btn:hover { opacity: 0.9; }
    .submit-btn:active { opacity: 0.8; }

    .filter-row { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 2px; scrollbar-width: none; }
    .filter-row::-webkit-scrollbar { display: none; }
    .filter-chip {
      padding: 6px 14px; border-radius: 20px; border: 1px solid var(--border);
      background: var(--card); font-size: 13px; font-weight: 500; color: var(--muted);
      cursor: pointer; white-space: nowrap; flex-shrink: 0; transition: all 0.12s;
    }
    .filter-chip.active { background: var(--primary); color: #fff; border-color: var(--primary); }

    @media (max-width: 480px) {
      .tx-item { padding: 12px; }
      .app { padding: 0.75rem; }
    }
  </style>
</head>
<body>

<div class="app">
  <!-- ГЛАВНАЯ СТРАНИЦА -->
  <div class="screen active" id="screen-home">
    <div class="topbar">
      <span class="topbar-title">Менің қаржым</span>
      <span style="font-size:13px; color:var(--muted)" id="month-label"></span>
    </div>

    <div class="balance-card">
      <div class="balance-label">Жалпы баланс</div>
      <div class="balance-amount" id="total-balance">₸ 0</div>
      <div class="balance-row">
        <div class="balance-stat">
          <div class="balance-stat-label">↓ Кіріс</div>
          <div class="balance-stat-value" id="total-income">₸ 0</div>
        </div>
        <div class="balance-stat">
          <div class="balance-stat-label">↑ Шығыс</div>
          <div class="balance-stat-value" id="total-expense">₸ 0</div>
        </div>
      </div>
    </div>

    <div class="filter-row" id="filter-row"></div>

    <div class="section-title">Транзакциялар</div>
    <div class="tx-list" id="tx-list"></div>
  </div>

  <!-- ФОРМА ДОБАВЛЕНИЯ -->
  <div class="screen" id="screen-add">
    <div class="topbar">
      <button class="topbar-btn" id="btn-back">← Артқа</button>
      <span class="topbar-title">Қосу</span>
      <div style="width:60px"></div>
    </div>

    <div class="form-card">
      <div class="type-switch">
        <button class="type-btn active" id="btn-expense-type" onclick="setType('expense')">Шығыс</button>
        <button class="type-btn" id="btn-income-type" onclick="setType('income')">Кіріс</button>
      </div>
      <div class="form-fields">
        <div>
          <div class="field-label">Сома (₸)</div>
          <input class="field-input" type="number" id="f-amount" placeholder="0" min="0">
        </div>
        <div>
          <div class="field-label">Атауы</div>
          <input class="field-input" type="text" id="f-title" placeholder="мысалы: Азық-түлік">
        </div>
        <div>
          <div class="field-label">Санат</div>
          <div class="category-grid" id="cat-grid"></div>
        </div>
        <button class="submit-btn" id="btn-submit">Сақтау</button>
      </div>
    </div>
  </div>
</div>

<button class="fab" id="fab-btn" title="Транзакция қосу">+</button>

<script>
  const CATS = [
    { id: 'food',      label: 'Тамақ',       icon: '🛒' },
    { id: 'transport', label: 'Көлік',        icon: '🚌' },
    { id: 'health',    label: 'Денсаулық',    icon: '💊' },
    { id: 'fun',       label: 'Ойын-сауық',   icon: '🎬' },
    { id: 'clothes',   label: 'Киім',         icon: '👗' },
    { id: 'home',      label: 'Үй',           icon: '🏠' },
    { id: 'salary',    label: 'Жалақы',       icon: '💼' },
    { id: 'other',     label: 'Басқа',        icon: '📦' },
  ];

  const FILTERS = ['Барлығы', 'Кіріс', 'Шығыс'];
  const MONTHS = ['Қаңтар','Ақпан','Наурыз','Сәуір','Мамыр','Маусым','Шілде','Тамыз','Қыркүйек','Қазан','Қараша','Желтоқсан'];

  let activeFilter = 'Барлығы';
  let currentType = 'expense';
  let selectedCat = null;

  function loadTx() {
    try { return JSON.parse(localStorage.getItem('kz_tx') || '[]'); } catch { return []; }
  }
  function saveTx(arr) {
    try { localStorage.setItem('kz_tx', JSON.stringify(arr)); } catch {}
  }

  function fmt(n) { return '₸ ' + Math.round(n).toLocaleString('kk-KZ'); }

  function renderSummary() {
    const txs = loadTx();
    const income = txs.filter(t => t.type === 'income').reduce((s, t) => s + t.amount, 0);
    const expense = txs.filter(t => t.type === 'expense').reduce((s, t) => s + t.amount, 0);
    document.getElementById('total-balance').textContent = fmt(income - expense);
    document.getElementById('total-income').textContent = fmt(income);
    document.getElementById('total-expense').textContent = fmt(expense);
  }

  function renderList() {
    const txs = loadTx();
    const filtered = txs.filter(t => {
      if (activeFilter === 'Кіріс') return t.type === 'income';
      if (activeFilter === 'Шығыс') return t.type === 'expense';
      return true;
    });
    const el = document.getElementById('tx-list');
    if (filtered.length === 0) {
      el.innerHTML = '<div class="empty">Транзакция жоқ</div>';
      return;
    }
    el.innerHTML = filtered.slice().reverse().map(t => {
      const cat = CATS.find(c => c.id === t.category) || CATS[7];
      const d = new Date(t.date);
      const dateStr = `${d.getDate()} ${MONTHS[d.getMonth()]}`;
      const sign = t.type === 'income' ? '+' : '-';
      return `
        <div class="tx-item">
          <div class="tx-icon" style="background:${t.type==='income'?'#DCFCE7':'#FEE2E2'}">${cat.icon}</div>
          <div class="tx-info">
            <div class="tx-title">${t.title}</div>
            <div class="tx-date">${dateStr} · ${cat.label}</div>
          </div>
          <div class="tx-amount ${t.type}">${sign}${fmt(t.amount).replace('₸ ','₸')}</div>
          <button class="tx-delete" onclick="deleteTx('${t.id}')" title="Жою">✕</button>
        </div>`;
    }).join('');
  }

  function renderFilters() {
    document.getElementById('filter-row').innerHTML = FILTERS.map(f =>
      `<button class="filter-chip${f===activeFilter?' active':''}" onclick="setFilter('${f}')">${f}</button>`
    ).join('');
  }

  function renderCats() {
    document.getElementById('cat-grid').innerHTML = CATS.map(c =>
      `<button class="cat-btn${selectedCat===c.id?' selected':''}" onclick="selectCat('${c.id}')"><span>${c.icon}</span>${c.label}</button>`
    ).join('');
  }

  function setFilter(f) { activeFilter = f; renderFilters(); renderList(); }

  function setType(t) {
    currentType = t;
    document.getElementById('btn-expense-type').classList.toggle('active', t === 'expense');
    document.getElementById('btn-income-type').classList.toggle('active', t === 'income');
  }

  function selectCat(id) { selectedCat = id; renderCats(); }

  function deleteTx(id) {
    saveTx(loadTx().filter(t => t.id !== id));
    renderSummary(); renderList();
  }

  function showScreen(name) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById('screen-' + name).classList.add('active');
    document.getElementById('fab-btn').style.display = name === 'home' ? 'flex' : 'none';
  }

  document.getElementById('fab-btn').onclick = () => {
    selectedCat = null;
    document.getElementById('f-amount').value = '';
    document.getElementById('f-title').value = '';
    setType('expense');
    renderCats();
    showScreen('add');
  };

  document.getElementById('btn-back').onclick = () => showScreen('home');

  document.getElementById('btn-submit').onclick = () => {
    const amount = parseFloat(document.getElementById('f-amount').value);
    const title = document.getElementById('f-title').value.trim();
    if (!amount || amount <= 0) { alert('Соманы енгізіңіз'); return; }
    if (!title) { alert('Атауын енгізіңіз'); return; }
    if (!selectedCat) { alert('Санат таңдаңыз'); return; }
    const tx = {
      id: Date.now().toString(),
      title, amount,
      type: currentType,
      category: selectedCat,
      date: new Date().toISOString()
    };
    const txs = loadTx();
    txs.push(tx);
    saveTx(txs);
    showScreen('home');
    renderSummary(); renderList();
  };

  // Ай атауы
  const now = new Date();
  document.getElementById('month-label').textContent = MONTHS[now.getMonth()] + ' ' + now.getFullYear();

  // Demo деректер (бос болса)
  if (loadTx().length === 0) {
    saveTx([
      { id:'1', title:'Азық-түлік', amount:8500, type:'expense', category:'food', date: new Date(Date.now()-86400000).toISOString() },
      { id:'2', title:'Маусым жалақысы', amount:350000, type:'income', category:'salary', date: new Date(Date.now()-2*86400000).toISOString() },
      { id:'3', title:'Автобус билеті', amount:1200, type:'expense', category:'transport', date: new Date(Date.now()-3*86400000).toISOString() },
      { id:'4', title:'Кино', amount:4000, type:'expense', category:'fun', date: new Date(Date.now()-4*86400000).toISOString() },
    ]);
  }

  renderSummary(); renderList(); renderFilters();
</script>
</body>
</html>
